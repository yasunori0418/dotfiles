# シェル統合セットアップのプロンプトを抑制する
skip-shell-integration-prompt = true

# ワークツリーの作成先パスのテンプレート
# デフォルト: リポジトリの兄弟ディレクトリ (例: ~/code/myproject.feature-auth)
worktree-path = "{{ repo_path }}/../{{ repo }}.{{ branch | sanitize }}"

# LLMによるコミットメッセージ自動生成
# wt merge / wt step squash 時にコミットメッセージを外部CLIで生成する
[commit.generation]
command = "CLAUDECODE= MAX_THINKING_TOKENS=0 claude -p --no-session-persistence --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

# wt list の表示オプションのデフォルト値
[list]
# summary = false     # LLMによるブランチ要約を表示 (commit.generation が必要)
# full = false        # CI・diffstat・LLM要約を全表示 (--full)
# branches = false    # ワークツリーのないブランチも表示 (--branches)
# remotes = false     # リモートのみのブランチも表示 (--remotes)
# task-timeout-ms = 0 # gitコマンドのタイムアウト(ms); 0で無効
# timeout-ms = 0      # collectフェーズ全体のタイムアウト(ms); 0で無効

# wt step commit / wt step squash / wt merge でのステージング設定
[commit]
stage = "tracked" # コミット前のステージ対象: "all"(全ファイル) / "tracked"(追跡済みのみ) / "none"

# wt merge の動作設定
[merge]
# squash = true # コミットを1つにまとめる (--no-squash で履歴保持)
# commit = true # 未コミット変更を先にコミット (--no-commit でスキップ)
# rebase = true # マージ前にターゲットへrebase (--no-rebase でスキップ)
# remove = true # マージ後にワークツリーを削除 (--no-remove で保持)
# verify = true # プロジェクトフックを実行 (--no-hooks でスキップ)
# ff = true     # fast-forwardマージ (--no-ff でマージコミットを作成)

# wt remove の動作設定
# [remove]
# delete-branch = true # ワークツリー削除後にブランチも削除 (--no-delete-branch で保持)

# wt switch の動作設定
[switch]
cd = true # スイッチ後にディレクトリを移動 (--no-cd でスキップ)

# wt switch のピッカー設定
[switch.picker]
pager = "delta --paging=never"   # diffプレビューのpagerを上書き

# worktree作成時の処理 (順に実行):
#   1. .worktreeinclude があれば、そこに書かれたファイルを実体コピー
#      (.worktreeinclude は global gitignore で無視されるので個人用ファイル)
#   2. 残りのgitignored物をsymlink化 (詳細は scripts/symlink-ignored.sh)
#   3. direnv allow
#   4. メインworktree直下に .worktreesetup があれば、新worktreeで実行
#      (プロジェクト固有のセットアップ。詳細は project-setup ブロックのコメント)
[[post-start]]
copy-include = "[ -f {{ primary_worktree_path }}/.worktreeinclude ] && wt step copy-ignored || true"

[[post-start]]
symlink-ignored = "$HOME/.config/worktrunk/scripts/symlink-ignored.sh {{ primary_worktree_path }}"

[[post-start]]
direnv = "direnv allow"

# プロジェクト固有のセットアップ (詳細は scripts/project-setup.sh):
#   メインworktree直下に個人用スクリプト .worktreesetup があれば、
#   新worktreeルートを cwd として実行する (第1引数 = メインworktreeパス)。
#   .worktreesetup は global gitignore で無視される個人用ファイルなので、
#   リポジトリ毎に中身を変えられ、git・チームには影響しない。
#   symlink-ignored 後に走るので node_modules 等の symlink は利用可能。
#   ファイルが無ければ何もしない (存在時はスクリプトの終了コードをログに残す)。
#   例: pnpm-lock.yaml があれば lint-staged / husky をセットアップ 等
[[post-start]]
project-setup = "$HOME/.config/worktrunk/scripts/project-setup.sh {{ primary_worktree_path }}"

# wt step copy-ignored の追加除外 (.worktreeinclude で絞った上で更に除外)
[step.copy-ignored]
exclude = [".cache/", ".turbo/", ".next/", ".parcel-cache/"]

# カスタムエイリアス: wt <name> で実行できるコマンドテンプレート
# [aliases]
# greet = "echo Hello from {{ branch }}"
