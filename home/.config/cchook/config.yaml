PreToolUse:
  # AskUserQuestion トグル: /tmp/cchook-no-askuserquestion が存在するとき AskUserQuestion を deny。
  # remote-control 経由のスマホ/web セッションでは、AskUserQuestion の質問文・選択肢の文脈が
  # 選択UIの前に表示されない挙動があるため、その環境では無効化してテキスト質問へ倒す。
  # 既定（マーカー不在）は有効。/tmp は macOS/Linux 共通の絶対パスで cchook は value を展開しないため直書き。
  # 再起動で /tmp が消え自然に既定（有効）へ復帰する。
  #   無効化: touch /tmp/cchook-no-askuserquestion
  #   再有効: rm -f /tmp/cchook-no-askuserquestion
  - matcher: "AskUserQuestion"
    conditions:
      - type: file_exists
        value: "/tmp/cchook-no-askuserquestion"
    actions:
      - type: output
        message: "このセッションでは AskUserQuestion は無効化されている（/tmp/cchook-no-askuserquestion が存在）。選択肢はメッセージ本文に番号付きで列挙し、ユーザーには番号または自由記述での回答を求めること。"
        permission_decision: deny
  - matcher: "WebFetch"
    conditions:
      - type: url_starts_with
        value: "https://github.com"
    actions:
      - type: output
        message: "WebFetchではなく、`gh`コマンド経由で情報を取得"
  # git rebase / git reset は全面禁止からスキル経由の許可制に変更。
  # rebase-flow / reset-flow スキルの arm スクリプトが .git 内に置く解錠 marker
  # （30 分有効）を git-guard が検証し、無ければ deny、あれば意見なし。
  # 意見なしの場合は settings.json の ask（`Bash(git rebase:*)` / `Bash(git reset:*)`）
  # に落ちるため、スキル経由でも実行直前にユーザー確認が入る（多層防御）。
  # コマンド全文の部分一致で拾うのは従来どおり（auto モード + 複合コマンドで
  # settings ルールが LLM 分類器にフォールバックして取りこぼす事故対策）。
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "git rebase"
    actions:
      - type: command
        command: $HOME/.config/cchook/scripts/git-guard/main.sh rebase
        use_stdin: true
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "pull --rebase"
    actions:
      - type: command
        command: $HOME/.config/cchook/scripts/git-guard/main.sh rebase
        use_stdin: true
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "git pull -r"
    actions:
      - type: command
        command: $HOME/.config/cchook/scripts/git-guard/main.sh rebase
        use_stdin: true
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "git reset"
    actions:
      - type: command
        command: $HOME/.config/cchook/scripts/git-guard/main.sh reset
        use_stdin: true
  # raw の force push は禁止（gh-push スキル経由に限定。保護ブランチ拒否・明示 lease
  # を script 側で強制するため）。通常 push は意見なし → settings の ask へ。
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "git push"
    actions:
      - type: command
        command: $HOME/.config/cchook/scripts/git-guard/main.sh push
        use_stdin: true
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "sudo"
    actions:
      - type: output
        message: "🚫 sudo は禁止（settings.json deny `Bash(sudo:*)`）。必要な場合はユーザーに確認を取ること。"
        exit_status: 2

PostToolUse:

Notification:

UserPromptSubmit:

Stop:
  - actions:
      - type: command
        command: $HOME/.config/cchook/scripts/notify-stop/main.sh '{.transcript_path}'

SubagentStop:

PreCompact:
  - matcher: "auto"
    actions:
      - type: output
        message: "直前の作業内容と最初の依頼内容は圧縮しないこと。過去の作業途中の内容を圧縮"

SessionStart:

SessionEnd:
