PreToolUse:
  # AskUserQuestion をセッション単位で無効化する。remote-control 経由のスマホ/web
  # セッションでは、質問文・選択肢の文脈が選択UIの前に表示されない挙動があるため、
  # そのセッションだけテキスト質問へ倒す。判定は guard スクリプトが stdin の
  # session_id からマーカー /tmp/claude-no-askuserquestion.<session_id> を探し、
  # 有れば deny・無ければ沈黙（通常進行）する。マーカーの作成/削除は下記
  # UserPromptSubmit のトグル（プロンプトに #aq-off / #aq-on）が行う。
  # 従来の PC 全体マーカー（/tmp/claude-no-askuserquestion）は廃止。/tmp なので
  # 再起動でマーカーが消え既定（有効）へ復帰する。
  - matcher: "AskUserQuestion"
    actions:
      - type: command
        command: $HOME/.claude/hooks/askuserquestion-guard/main.sh
        use_stdin: true
  - matcher: "WebFetch"
    conditions:
      - type: url_starts_with
        value: "https://github.com"
    actions:
      - type: output
        message: "WebFetchではなく、`gh`コマンド経由で情報を取得"
  # git rebase / git reset は全面禁止からスキル経由の許可制に変更。
  # rebase-flow / reset-flow スキルの arm スクリプトが .git 内に置く解錠 marker
  # （30 分有効）を git-guard が検証し、無ければ deny、あれば意見なし。
  # 意見なしの場合は settings.json の ask（`Bash(git rebase:*)` / `Bash(git reset:*)`）
  # に落ちるため、スキル経由でも実行直前にユーザー確認が入る（多層防御）。
  # コマンド全文の部分一致で拾うのは従来どおり（auto モード + 複合コマンドで
  # settings ルールが LLM 分類器にフォールバックして取りこぼす事故対策）。
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "git rebase"
    actions:
      - type: command
        command: $HOME/.claude/hooks/git-guard/main.sh rebase
        use_stdin: true
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "pull --rebase"
    actions:
      - type: command
        command: $HOME/.claude/hooks/git-guard/main.sh rebase
        use_stdin: true
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "git pull -r"
    actions:
      - type: command
        command: $HOME/.claude/hooks/git-guard/main.sh rebase
        use_stdin: true
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "git reset"
    actions:
      - type: command
        command: $HOME/.claude/hooks/git-guard/main.sh reset
        use_stdin: true
  # raw の force push は禁止（gh-push スキル経由に限定。保護ブランチ拒否・明示 lease
  # を script 側で強制するため）。通常 push は意見なし → settings の ask へ。
  - matcher: "Bash"
    conditions:
      - type: command_contains
        value: "git push"
    actions:
      - type: command
        command: $HOME/.claude/hooks/git-guard/main.sh push
        use_stdin: true
  - matcher: "Bash"
    actions:
      - type: command
        command: $HOME/.claude/hooks/sudo-guard/main.sh
        use_stdin: true

PostToolUse:

Notification:

UserPromptSubmit:
  # AskUserQuestion 無効化トグル: プロンプトに #aq-off / #aq-on を含めると、その
  # セッションのマーカー（/tmp/claude-no-askuserquestion.<session_id>）を作成/削除する。
  # セッション単位なので同一 PC・同一プロジェクトの並行セッションには影響しない。
  - actions:
      - type: command
        command: $HOME/.claude/hooks/askuserquestion-toggle/main.sh
        use_stdin: true

Stop:
  - actions:
      - type: command
        command: $HOME/.claude/hooks/notify-stop/main.sh '{.transcript_path}'

SubagentStop:

PreCompact:
  - matcher: "auto"
    actions:
      - type: output
        message: "直前の作業内容と最初の依頼内容は圧縮しないこと。過去の作業途中の内容を圧縮"

SessionStart:

SessionEnd:
