# Git plugins
[[plugins]] # gitsigns.nvim
repo = 'github.com/lewis6991/gitsigns.nvim'
on_event = ['CursorHold', 'BufRead']
hooks_file = '$HOOKS_DIR/gitsigns.lua'

[[plugins]]
repo = 'github.com/lambdalisue/vim-gin'
depends = ['denops.vim']
on_cmd = [
  'Gin',
  'GinBuffer',
  'GinBranch',
  'GinBrowse',
  'GinCd',
  'GinLcd',
  'GinTcd',
  'GinChaperon',
  'GinDiff',
  'GinEdit',
  'GinLog',
  'GinRefLog',
  'GinStash',
  'GinTag',
  'GinPatch',
  'GinStatus',
  'GinBlame',
]
hooks_file = '$HOOKS_DIR/gin.lua'
